name: HaKa Publish Example

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: draft
        type: choice
        options:
          - draft
          - staging
          - production
      figma_file_key:
        description: Figma file key
        required: false
        type: string
      variables_payload_format:
        description: Variables payload format from HaKa
        required: true
        default: canonical
        type: choice
        options:
          - canonical
          - figma_enriched_canonical
      variables_payload_json:
        description: Variables payload JSON from HaKa
        required: true
        type: string
      source:
        description: Caller
        required: false
        default: haka
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm trigger
        run: |
          echo "Source: ${{ inputs.source }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Figma file key: ${{ inputs.figma_file_key }}"
          echo "Variables payload format: ${{ inputs.variables_payload_format }}"

      - name: Write variables payload
        env:
          VARIABLES_PAYLOAD_JSON: ${{ inputs.variables_payload_json }}
        run: |
          printf '%s' "$VARIABLES_PAYLOAD_JSON" > haka-variables.json

      - name: Run team publish logic
        run: |
          echo "Replace this step with your team-owned token transform and release steps."
          echo "Payload written to haka-variables.json"
