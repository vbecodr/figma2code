name: Publish tokens from Figma

on:
  workflow_dispatch:
    inputs:
      figma_file_key:
        description: Figma file key
        required: false
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - draft
          - staging
          - production
      destination:
        description: Token destination
        required: false
        type: string
      release_note:
        description: Optional release note
        required: false
        type: string
      variables_payload_format:
        description: Variables payload format from HaKa
        required: true
        default: canonical
        type: choice
        options:
          - canonical
          - figma_enriched_canonical
      variables_payload_json:
        description: Variables payload JSON from HaKa
        required: true
        type: string
      source:
        description: Trigger source
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Persist HaKa payload
        env:
          VARIABLES_PAYLOAD_JSON: ${{ inputs.variables_payload_json }}
        run: |
          printf '%s' "$VARIABLES_PAYLOAD_JSON" > haka-variables.json

      - name: Transform tokens
        run: |
          echo "TODO: transform haka-variables.json into your team format"
          echo "Payload format: ${{ inputs.variables_payload_format }}"

      - name: Publish artifacts
